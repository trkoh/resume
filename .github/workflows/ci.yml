name: CI

on:
  push:
    branches: [main]
    paths: ["src/**"]
  pull_request:
    branches: [main]
    paths: ["src/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx textlint src/職務経歴書.md

  build-pdf:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: lint
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - uses: typst-community/setup-typst@v4
      - name: Compile PDF
        run: typst compile src/職務経歴書.typ resume.pdf
      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resume.pdf
          git diff --cached --quiet || git commit -m "build: update PDF [skip ci]"
          git push
