name: Remind Update

on:
  schedule:
    - cron: "0 0 1 */3 *"
  workflow_dispatch:

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `職務経歴書の定期更新 (${new Date().toISOString().slice(0, 7)})`,
              body: [
                '## 更新チェックリスト',
                '',
                '- [ ] 新しいプロジェクト・業務経験の追加',
                '- [ ] 数値（経験年数、期間等）の更新',
                '- [ ] スキルセットの追記・見直し',
                '- [ ] 資格の追加',
                '- [ ] 自己PRの見直し',
                '- [ ] 日付（「現在」表記）の更新',
              ].join('\n'),
              labels: ['maintenance'],
            });
